<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galaxy Demo — Megano</title>
<link rel="stylesheet" href="style.css" />
<style>
  body { overflow: hidden; }
  #scene { position: fixed; inset: 0; z-index: 0; }
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px 32px;
  }
  .overlay > * { pointer-events: auto; }
  .overlay nav { position: relative; }
  .demo-info {
    max-width: 380px;
    padding: 24px 28px;
    background: rgba(7, 7, 13, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .demo-info .eyebrow {
    font-size: 11px;
    color: var(--primary);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .demo-info h2 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .demo-info p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .demo-info .stats {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .demo-info .stat-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .demo-info .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .demo-controls {
    display: flex;
    gap: 8px;
    align-self: flex-start;
  }
  .demo-btn {
    padding: 10px 16px;
    border-radius: 10px;
    background: rgba(7, 7, 13, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s var(--ease);
  }
  .demo-btn:hover { background: var(--surface-hover); border-color: var(--border-strong); }
  .demo-btn.active { background: var(--primary); border-color: var(--primary); }
  .demo-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    padding: 10px 20px;
    background: rgba(7, 7, 13, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--text-muted);
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div class="overlay">
  <nav class="meg-nav" style="position:relative;background:rgba(7,7,13,0.55);">
    <div class="nav-inner">
      <a href="index.html" class="logo">megano</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="demo.html">Galaxy</a></li>
        <li><a href="playground.html">Playground</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </div>
  </nav>

  <div style="display:flex;justify-content:space-between;align-items:flex-end;">
    <div class="demo-info">
      <div class="eyebrow">// live demo</div>
      <h2>Spiral Galaxy</h2>
      <p>18 000 particules en trois bras spiraux, générées proceduralement et rendues en WebGL.</p>
      <div class="stats">
        <div>
          <div class="stat-val" id="fps">60</div>
          <div class="stat-label">FPS</div>
        </div>
        <div>
          <div class="stat-val">18k</div>
          <div class="stat-label">Particules</div>
        </div>
        <div>
          <div class="stat-val">3</div>
          <div class="stat-label">Spirales</div>
        </div>
      </div>
    </div>

    <div class="demo-controls">
      <button class="demo-btn active" id="btn-rotate">Auto-rotate</button>
      <button class="demo-btn" id="btn-color">Color cycle</button>
      <button class="demo-btn" id="btn-reset">Reset view</button>
    </div>
  </div>
</div>

<div class="demo-hint">drag pour orbiter · scroll pour zoomer</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/[email protected]/build/three.module.js",
    "three/addons/": "https://unpkg.com/[email protected]/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 35, 75);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene'), antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.maxDistance = 300;
controls.minDistance = 10;

const COUNT = 18000;
const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);
const sizes = new Float32Array(COUNT);

const palettes = [
  { pink: '#ff80c0', blue: '#6090ff', warm: '#ffd080', teal: '#80ffe0' },
  { pink: '#ff4060', blue: '#ff8040', warm: '#ffea60', teal: '#80ff80' },
  { pink: '#80ffff', blue: '#6080ff', warm: '#a060ff', teal: '#ff60c0' },
  { pink: '#ffa040', blue: '#ff60a0', warm: '#a060ff', teal: '#4060ff' }
];
let paletteIdx = 0;

function pickColor(t, pal) {
  const out = new THREE.Color();
  if (t < 0.33) out.lerpColors(new THREE.Color(pal.pink), new THREE.Color(pal.blue), t / 0.33);
  else if (t < 0.66) out.lerpColors(new THREE.Color(pal.blue), new THREE.Color(pal.warm), (t - 0.33) / 0.33);
  else out.lerpColors(new THREE.Color(pal.warm), new THREE.Color(pal.teal), (t - 0.66) / 0.34);
  return out;
}

function buildGalaxy(pal) {
  for (let i = 0; i < COUNT; i++) {
    const r = Math.pow(Math.random(), 0.55) * 90;
    const armIndex = i % 3;
    const armOffset = armIndex * (Math.PI * 2 / 3);
    const spinAngle = r * 0.045;
    const branchAngle = armOffset + spinAngle + (Math.random() - 0.5) * 0.55;

    const spread = 4.5 * Math.pow(r / 90, 0.5);
    const x = Math.cos(branchAngle) * r + (Math.random() - 0.5) * spread;
    const y = (Math.random() - 0.5) * 2.2 * Math.exp(-r / 45);
    const z = Math.sin(branchAngle) * r + (Math.random() - 0.5) * spread;

    positions[i * 3]     = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;

    const t = Math.min(1, r / 90);
    const base = pickColor(t, pal);
    const centerBoost = Math.max(0, 1 - r / 25);
    const brightness = 0.6 + Math.random() * 0.6 + centerBoost * 0.5;
    const col = base.clone().multiplyScalar(brightness);

    colors[i * 3]     = col.r;
    colors[i * 3 + 1] = col.g;
    colors[i * 3 + 2] = col.b;

    sizes[i] = (Math.random() * 0.7 + 0.35) * (1 - r / 120) + 0.2;
  }
}

const pal = palettes[0];
buildGalaxy(pal);

const galaxyGeom = new THREE.BufferGeometry();
galaxyGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
galaxyGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
galaxyGeom.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

const galaxyMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float aSize;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = aSize * (320.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.0, d);
      alpha = pow(alpha, 1.6);
      gl_FragColor = vec4(vColor, alpha * 0.95);
    }
  `
});

const galaxy = new THREE.Points(galaxyGeom, galaxyMat);
scene.add(galaxy);

const coreGeom = new THREE.SphereGeometry(2.2, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: 0xffeacc, transparent: true, opacity: 0.95 });
const core = new THREE.Mesh(coreGeom, coreMat);
scene.add(core);

const haloGeom = new THREE.SphereGeometry(6, 32, 32);
const haloMat = new THREE.MeshBasicMaterial({ color: 0xffaa66, transparent: true, opacity: 0.18, blending: THREE.AdditiveBlending });
const halo = new THREE.Mesh(haloGeom, haloMat);
scene.add(halo);

const BG_COUNT = 4000;
const bgPos = new Float32Array(BG_COUNT * 3);
const bgCol = new Float32Array(BG_COUNT * 3);
for (let i = 0; i < BG_COUNT; i++) {
  const r = 600 + Math.random() * 600;
  const t = Math.random() * Math.PI * 2;
  const p = Math.acos(2 * Math.random() - 1);
  bgPos[i * 3]     = r * Math.sin(p) * Math.cos(t);
  bgPos[i * 3 + 1] = r * Math.cos(p);
  bgPos[i * 3 + 2] = r * Math.sin(p) * Math.sin(t);
  const b = 0.4 + Math.random() * 0.6;
  bgCol[i * 3]     = b;
  bgCol[i * 3 + 1] = b;
  bgCol[i * 3 + 2] = Math.min(1, b + Math.random() * 0.25);
}
const bgGeom = new THREE.BufferGeometry();
bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
bgGeom.setAttribute('color', new THREE.BufferAttribute(bgCol, 3));
const bgMat = new THREE.PointsMaterial({ size: 1.4, vertexColors: true, transparent: true, opacity: 0.85, sizeAttenuation: false });
const bgStars = new THREE.Points(bgGeom, bgMat);
scene.add(bgStars);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Controls
const btnRotate = document.getElementById('btn-rotate');
const btnColor = document.getElementById('btn-color');
const btnReset = document.getElementById('btn-reset');
btnRotate.addEventListener('click', () => {
  controls.autoRotate = !controls.autoRotate;
  btnRotate.classList.toggle('active', controls.autoRotate);
});
btnColor.addEventListener('click', () => {
  paletteIdx = (paletteIdx + 1) % palettes.length;
  const newPal = palettes[paletteIdx];
  for (let i = 0; i < COUNT; i++) {
    const x = positions[i * 3], y = positions[i * 3 + 1], z = positions[i * 3 + 2];
    const r = Math.sqrt(x * x + z * z);
    const t = Math.min(1, r / 90);
    const base = pickColor(t, newPal);
    const centerBoost = Math.max(0, 1 - r / 25);
    const brightness = 0.6 + 0.6 + centerBoost * 0.5;
    const col = base.clone().multiplyScalar(brightness);
    colors[i * 3] = col.r;
    colors[i * 3 + 1] = col.g;
    colors[i * 3 + 2] = col.b;
  }
  galaxyGeom.attributes.color.needsUpdate = true;
});
btnReset.addEventListener('click', () => {
  camera.position.set(0, 35, 75);
  controls.target.set(0, 0, 0);
  controls.update();
});

// FPS
const fpsEl = document.getElementById('fps');
let lastTime = performance.now();
let frames = 0;
let fpsAccum = 0;

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  core.scale.setScalar(1 + Math.sin(t * 2) * 0.08);
  halo.scale.setScalar(1 + Math.sin(t * 1.2) * 0.12);
  controls.update();
  renderer.render(scene, camera);

  frames++;
  const now = performance.now();
  fpsAccum += now - lastTime;
  lastTime = now;
  if (fpsAccum >= 500) {
    fpsEl.textContent = Math.round((frames * 1000) / fpsAccum);
    frames = 0;
    fpsAccum = 0;
  }
}
animate();
</script>
<script src="main.js"></script>
</body>
</html>
