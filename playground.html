<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playground — Megano</title>
<link rel="stylesheet" href="style.css" />
<style>
  body { overflow: hidden; }
  canvas#pg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at center, #0e0e18 0%, #07070d 70%);
  }
  .pg-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .pg-overlay > * { pointer-events: auto; }
  .pg-overlay nav { position: relative; }
  .pg-panel {
    margin: 0 0 0 32px;
    padding: 22px 26px;
    background: rgba(7, 7, 13, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    max-width: 340px;
  }
  .pg-panel .eyebrow {
    font-size: 11px;
    color: var(--primary);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .pg-panel h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .pg-panel p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .pg-controls {
    align-self: flex-end;
    margin: 0 32px 0 0;
    padding: 18px 22px;
    background: rgba(7, 7, 13, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px 18px;
    align-items: center;
    font-size: 12px;
  }
  .pg-controls label {
    color: var(--text-muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .pg-controls input[type="range"] {
    width: 160px;
    accent-color: var(--primary);
  }
  .pg-controls input[type="color"] {
    width: 40px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    padding: 2px;
  }
  .pg-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .pg-btn {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s var(--ease);
  }
  .pg-btn:hover { background: var(--surface-hover); border-color: var(--border-strong); }
  .pg-btn.primary { background: var(--primary); border-color: var(--primary); }
  .pg-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    padding: 10px 22px;
    background: rgba(7, 7, 13, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--text-muted);
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="pg"></canvas>

<div class="pg-overlay">
  <nav class="meg-nav" style="position:relative;background:rgba(7,7,13,0.55);">
    <div class="nav-inner">
      <a href="index.html" class="logo">megano</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="demo.html">Galaxy</a></li>
        <li><a href="playground.html">Playground</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </div>
  </nav>

  <div style="display:flex;justify-content:space-between;align-items:flex-end;padding:0 0 80px 0;">
    <div class="pg-panel">
      <div class="eyebrow">// playground</div>
      <h2>Particle Field</h2>
      <p>Déplace ta souris pour déplacer les particules. Click pour exploser, espace pour reset.</p>
    </div>

    <div class="pg-controls">
      <label>Count</label>
      <input type="range" id="ctl-count" min="50" max="2000" value="600" step="50">

      <label>Speed</label>
      <input type="range" id="ctl-speed" min="1" max="20" value="8">

      <label>Size</label>
      <input type="range" id="ctl-size" min="1" max="12" value="3">

      <label>Color</label>
      <input type="color" id="ctl-color" value="#a060ff">

      <div class="pg-actions">
        <button class="pg-btn" id="ctl-clear">Clear</button>
        <button class="pg-btn primary" id="ctl-explode">Explode</button>
      </div>
    </div>
  </div>
</div>

<div class="pg-hint">move your mouse · click to ripple</div>

<script src="main.js"></script>
<script>
(function () {
  const canvas = document.getElementById('pg');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0;
  function resize() {
    W = canvas.width = innerWidth * devicePixelRatio;
    H = canvas.height = innerHeight * devicePixelRatio;
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
  }
  resize();
  addEventListener('resize', resize);

  const state = {
    count: 600,
    speed: 8,
    size: 3,
    color: '#a060ff',
    particles: [],
    mouse: { x: -9999, y: -9999, active: false, down: false },
    ripples: []
  };

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawnParticle() {
    const angle = Math.random() * Math.PI * 2;
    const radius = rand(50, Math.min(W, H) * 0.4);
    return {
      x: W / 2 + Math.cos(angle) * radius,
      y: H / 2 + Math.sin(angle) * radius,
      vx: 0, vy: 0,
      ax: 0, ay: 0,
      baseX: 0, baseY: 0,
      angle: angle,
      radius: radius,
      phase: Math.random() * Math.PI * 2,
      size: rand(0.5, 1.5)
    };
  }

  function rebuild() {
    state.particles = [];
    for (let i = 0; i < state.count; i++) {
      const p = spawnParticle();
      p.baseX = p.x;
      p.baseY = p.y;
      state.particles.push(p);
    }
  }
  rebuild();

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    state.mouse.x = (e.clientX - rect.left) * devicePixelRatio;
    state.mouse.y = (e.clientY - rect.top) * devicePixelRatio;
    state.mouse.active = true;
  });
  canvas.addEventListener('mouseleave', () => { state.mouse.active = false; });
  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    state.ripples.push({
      x: (e.clientX - rect.left) * devicePixelRatio,
      y: (e.clientY - rect.top) * devicePixelRatio,
      r: 0, life: 1
    });
  });

  addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      rebuild();
    }
  });

  document.getElementById('ctl-count').addEventListener('input', (e) => {
    state.count = parseInt(e.target.value);
    rebuild();
  });
  document.getElementById('ctl-speed').addEventListener('input', (e) => {
    state.speed = parseInt(e.target.value);
  });
  document.getElementById('ctl-size').addEventListener('input', (e) => {
    state.size = parseInt(e.target.value);
  });
  document.getElementById('ctl-color').addEventListener('input', (e) => {
    state.color = e.target.value;
  });
  document.getElementById('ctl-clear').addEventListener('click', () => {
    state.particles = [];
  });
  document.getElementById('ctl-explode').addEventListener('click', () => {
    const cx = W / 2, cy = H / 2;
    state.particles.forEach((p) => {
      const dx = p.x - cx, dy = p.y - cy;
      const d = Math.sqrt(dx * dx + dy * dy) + 0.1;
      const force = 12;
      p.vx += (dx / d) * force;
      p.vy += (dy / d) * force;
    });
  });

  function hexToRgb(hex) {
    const m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
    if (!m) return { r: 160, g: 96, b: 255 };
    return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
  }

  const clock = { last: performance.now() };
  function tick() {
    const now = performance.now();
    const dt = Math.min(33, now - clock.last) / 16.67; // normalize to ~60fps units
    clock.last = now;

    // fade trails
    ctx.fillStyle = 'rgba(7, 7, 13, 0.18)';
    ctx.fillRect(0, 0, W, H);

    const colRgb = hexToRgb(state.color);
    const speed = state.speed;

    // Update particles
    for (let i = 0; i < state.particles.length; i++) {
      const p = state.particles[i];

      // mouse repulsion
      if (state.mouse.active) {
        const dx = p.x - state.mouse.x;
        const dy = p.y - state.mouse.y;
        const d2 = dx * dx + dy * dy;
        const r = 200 * devicePixelRatio;
        if (d2 < r * r && d2 > 1) {
          const d = Math.sqrt(d2);
          const force = (1 - d / r) * speed * 0.5;
          p.ax = (dx / d) * force;
          p.ay = (dy / d) * force;
        } else {
          p.ax = 0; p.ay = 0;
        }
      } else {
        // gentle return to orbit base
        p.ax = (p.baseX - p.x) * 0.001 * speed;
        p.ay = (p.baseY - p.y) * 0.001 * speed;
      }

      p.vx += p.ax * dt;
      p.vy += p.ay * dt;
      p.vx *= 0.94;
      p.vy *= 0.94;
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // ripple wave
      let rippleBoost = 0;
      for (let r = 0; r < state.ripples.length; r++) {
        const rp = state.ripples[r];
        const dxr = p.x - rp.x;
        const dyr = p.y - rp.y;
        const dr = Math.sqrt(dxr * dxr + dyr * dyr);
        const wave = Math.abs(dr - rp.r);
        if (wave < 30 * devicePixelRatio) {
          rippleBoost += (1 - wave / (30 * devicePixelRatio)) * rp.life;
        }
      }
      const sizeMul = state.size * (1 + rippleBoost * 1.5) * p.size;

      // draw
      const a = 0.6 + rippleBoost * 0.4;
      ctx.fillStyle = `rgba(${colRgb.r}, ${colRgb.g}, ${colRgb.b}, ${a})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sizeMul, 0, Math.PI * 2);
      ctx.fill();

      // glow
      if (rippleBoost > 0.1) {
        ctx.fillStyle = `rgba(${colRgb.r}, ${colRgb.g}, ${colRgb.b}, ${a * 0.3})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, sizeMul * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // draw ripples
    for (let i = state.ripples.length - 1; i >= 0; i--) {
      const r = state.ripples[i];
      r.r += 6 * devicePixelRatio * dt;
      r.life -= 0.015 * dt;
      if (r.life <= 0) state.ripples.splice(i, 1);
      else {
        ctx.strokeStyle = `rgba(${colRgb.r}, ${colRgb.g}, ${colRgb.b}, ${r.life * 0.5})`;
        ctx.lineWidth = 2 * devicePixelRatio;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
